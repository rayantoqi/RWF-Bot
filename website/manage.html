<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>RWF | إعدادات السيرفر</title>
    <style>
        body { background: #0f1216; color: white; font-family: 'Cairo', sans-serif; padding: 50px; }
        .form-group { margin-bottom: 25px; background: #1c1f26; padding: 20px; border-radius: 10px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; background: #2f3136; border: 1px solid #444; color: white; border-radius: 5px; }
        .save-btn { background: #5865F2; color: white; padding: 10px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1rem; }
        .save-btn:hover { background: #4752c4; }
    </style>
</head>
<body>
    <h1>إعدادات السيرفر ⚙️</h1>
    
    <div class="form-group">
        <label>رسالة الترحيب:</label>
        <textarea id="welcomeMsg" rows="3" placeholder="اكتب رسالة الترحيب هنا..."></textarea>
    </div>
    
    <div class="form-group">
        <label>ID قناة الترحيب:</label>
        <input type="text" id="welcomeChannel" placeholder="أدخل ID الروم هنا">
    </div>

    <div class="form-group">
        <label>ID روم التكت:</label>
        <input type="text" id="ticketRoom" placeholder="مثلاً: 1234567890">
    </div>

    <button class="save-btn" onclick="saveData()">حفظ الإعدادات ✅</button>

    <script>
        async function saveData() {
            const guildID = window.location.pathname.split('/').pop();
            const welcomeMsg = document.getElementById('welcomeMsg').value;
            const ticketRoom = document.getElementById('ticketRoom').value;

            const res = await fetch(`/api/save-settings/${guildID}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ welcomeMsg, ticketRoom })
            });

            if (res.ok) alert('تم حفظ الإعدادات بنجاح!');
        }
    </script>
</body>
</html>
