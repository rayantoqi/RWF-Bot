<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWF | لوحة التحكم المتطورة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #5865F2; --bg: #0f1216; --side: #161920; --card: #1c1f26; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Cairo', sans-serif; display: flex; }
        .sidebar { width: 250px; background: var(--side); height: 100vh; position: fixed; border-left: 1px solid #2d3139; }
        .sidebar-header { padding: 30px; text-align: center; border-bottom: 1px solid #2d3139; }
        .sidebar-menu { padding: 20px; }
        .menu-item { padding: 15px; display: flex; align-items: center; gap: 10px; color: #b9bbbe; cursor: pointer; border-radius: 8px; transition: 0.3s; margin-bottom: 10px; }
        .menu-item:hover, .menu-item.active { background: var(--main); color: white; }
        .main-content { margin-right: 250px; padding: 40px; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .card { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: var(--main); }
        select, input { width: 100%; padding: 12px; background: #2f3136; border: 1px solid #444; color: white; border-radius: 8px; font-family: 'Cairo'; }
        .btn-save { background: var(--main); color: white; border: none; padding: 12px 40px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; }
        .btn-save:hover { background: #4752c4; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h3>RWF BOT</h3></div>
        <div class="sidebar-menu">
            <div class="menu-item active"><i class="fas fa-ticket-alt"></i> نظام التذاكر</div>
            <a href="/dashboard" style="text-decoration:none; color:inherit;"><div class="menu-item"><i class="fas fa-arrow-right"></i> العودة للسيرفرات</div></a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 id="guild-name">إعدادات التذاكر</h1>
        </div>

        <div class="card">
            <h3>🎫 إرسال لوحة التذاكر (Panel)</h3>
            <div class="input-group">
                <label>روم إرسال التذكرة:</label>
                <select id="ticketChannel"><option>جاري تحميل القنوات...</option></select>
            </div>
            <div class="input-group">
                <label>عنوان التذكرة:</label>
                <input type="text" id="ticketTitle" placeholder="مثلاً: فتح تذكرة دعم فني">
            </div>
            <button class="btn-save" onclick="sendTicketPanel()" style="background: #3ba55c;">إرسال اللوحة للسيرفر 🚀</button>
        </div>
    </div>

    <script>
        const guildID = window.location.pathname.split('/').pop();

        async function init() {
            try {
                // جلب القنوات ووضعها في القائمة المنسدلة
                const res = await fetch(`/api/guild-channels/${guildID}`);
                const channels = await res.json();
                const select = document.getElementById('ticketChannel');
                select.innerHTML = channels.map(ch => `<option value="${ch.id}">${ch.name}</option>`).join('');
            } catch (e) { console.error("Error loading channels"); }
        }

        async function sendTicketPanel() {
            const channelId = document.getElementById('ticketChannel').value;
            const title = document.getElementById('ticketTitle').value;

            const res = await fetch(`/api/send-ticket-panel/${guildID}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ channelId, title })
            });
            
            if(res.ok) alert('تم إرسال لوحة التذاكر بنجاح! ✅');
            else alert('حدث خطأ أثناء الإرسال ❌');
        }

        init(); // تشغيل الدالة عند تحميل الصفحة
    </script>
</body>
</html>
