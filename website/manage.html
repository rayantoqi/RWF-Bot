<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWF | لوحة إدارة السيرفر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5865f2;
            --success: #57f287;
            --warning: #faa61a;
            --danger: #ed4245;
            --bg-primary: #36393f;
            --bg-secondary: #2f3136;
            --bg-tertiary: #202225;
            --sidebar: #23272a;
            --glass: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --text-primary: #dcddde;
            --text-muted: #8e9297;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, var(--sidebar), var(--bg-tertiary));
            height: 100vh;
            position: fixed;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 30px 25px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: blur(15px);
        }

        .guild-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 3px solid var(--primary);
            box-shadow: var(--shadow);
        }

        .guild-name { font-size: 1.3rem; font-weight: 600; margin-bottom: 5px; }

        .sidebar-menu { padding: 20px; }

        .menu-item {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .menu-item:hover, .menu-item.active {
            background: var(--glass);
            color: var(--text-primary);
            border: 1px solid var(--primary);
            transform: translateX(-5px);
        }

        .main-content {
            margin-left: 280px;
            height: 100vh;
            overflow-y: auto;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .card-title {
            font-size: 1.5rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .input-group { margin-bottom: 25px; }

        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--primary);
            font-size: 0.95rem;
        }

        select, input, textarea {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-tertiary);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.1);
        }

        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary), #5b67f0);
            color: white;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
        }

        .btn-success {
            background: linear-gradient(45deg, var(--success), #4fd679);
            color: white;
            box-shadow: 0 4px 15px rgba(87, 242, 135, 0.4);
        }

        .btn-full { width: 100%; padding: 18px; font-size: 1.1rem; }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 9999;
            animation: slideDown 0.3s ease;
        }

        .notification.success { background: var(--success); }
        .notification.error { background: var(--danger); }

        @keyframes slideDown {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        @media (max-width: 1024px) {
            .sidebar { width: 70px; }
            .sidebar-header h3, .guild-name, .menu-item span { display: none; }
            .main-content { margin-left: 70px; }
            .menu-item { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <img class="guild-icon" id="guildIcon" src="" alt="Guild Icon">
            <div class="guild-name" id="guildName">تحميل...</div>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item active" data-section="tickets">
                <i class="fas fa-ticket-alt"></i><span>نظام التذاكر</span>
            </div>
            <div class="menu-item" data-section="welcome">
                <i class="fas fa-comment-dots"></i><span>رسائل الترحيب</span>
            </div>
            <a href="/dashboard" style="text-decoration: none; color: inherit;">
                <div class="menu-item"><i class="fas fa-arrow-left"></i><span>السيرفرات</span></div>
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <div>
                <h1 id="pageTitle">نظام التذاكر</h1>
                <div style="color: var(--success); font-size: 0.9rem;"><i class="fas fa-circle" style="font-size: 8px;"></i> متصل</div>
            </div>
            <button class="btn btn-primary" onclick="saveAllSettings()"><i class="fas fa-save"></i> حفظ الكل</button>
        </div>

        <div id="tickets-section" class="section">
            <div class="card">
                <h3 class="card-title"><i class="fas fa-ticket-alt"></i> إرسال لوحة التذاكر</h3>
                <div class="input-group">
                    <label class="input-label"><i class="fas fa-hashtag"></i> قناة اللوحة</label>
                    <select id="ticketChannel"><option>جاري التحميل...</option></select>
                </div>
                <div class="input-group">
                    <label class="input-label"><i class="fas fa-heading"></i> العنوان</label>
                    <input type="text" id="ticketTitle" placeholder="مركز الدعم الفني" value="مركز الدعم">
                </div>
                <div class="input-group">
                    <label class="input-label"><i class="fas fa-list"></i> نوع التفاعل</label>
                    <select id="ticketType">
                        <option value="buttons">زر واحد</option>
                        <option value="select">قائمة منسدلة</option>
                    </select>
                </div>
                <div class="input-group">
                    <label class="input-label"><i class="fas fa-layer-group"></i> الحد الأقصى</label>
                    <input type="number" id="ticketLimit" value="2" min="1" max="10">
                </div>
                <div class="input-group">
                    <label class="input-label"><i class="fas fa-palette"></i> اللون</label>
                    <input type="color" id="embedColor" value="#5865F2">
                </div>
                <button class="btn btn-success btn-full" onclick="sendTicketPanel()"><i class="fas fa-paper-plane"></i> إرسال اللوحة</button>
            </div>

            <div class="card">
                <h3 class="card-title"><i class="fas fa-users-cog"></i> رتب الإدارة</h3>
                <div class="input-group">
                    <label class="input-label"><i class="fab fa-minecraft"></i> رتبة الماين كرافت</label>
                    <input type="text" id="mcRole" placeholder="123456789012345678">
                </div>
                <div class="input-group">
                    <label class="input-label"><i class="fab fa-discord"></i> رتبة الديسكورد</label>
                    <input type="text" id="discordRole" placeholder="123456789012345678">
                </div>
        </div>

        <div id="welcome-section" class="section" style="display: none;">
            <div class="card">
                <h3 class="card-title"><i class="fas fa-comment-dots"></i> إعدادات الترحيب</h3>
                <div class="input-group">
                    <label class="input-label"><i class="fas fa-hashtag"></i> قناة الترحيب</label>
                    <select id="welcomeChannel"><option>جاري التحميل...</option></select>
                </div>
                <div class="input-group">
                    <label class="input-label"><i class="fas fa-edit"></i> نص الرسالة</label>
                    <textarea id="welcomeMessage" rows="4">أهلاً بك [user] في [server] 🎉</textarea>
                </div>
                <button class="btn btn-success btn-full" onclick="saveWelcome()"><i class="fas fa-save"></i> حفظ</button>
            </div>
    </div>

    <script>
        const guildID = window.location.pathname.split('/').pop();
        let channels = [];

        async function init() {
            await loadChannels();
            await loadSettings();
        }

        async function loadChannels() {
            try {
                const res = await fetch(`/api/guild-channels/${guildID}`);
                channels = await res.json();
                const fill = (id) => {
                    const el = document.getElementById(id);
                    el.innerHTML = '<option value="">اختر قناة...</option>' +
                        channels.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                };
                fill('ticketChannel');
                fill('welcomeChannel');
            } catch (e) { console.error('خطأ في تحميل القنوات:', e); }
        }

        async function loadSettings() {
            try {
                const res = await fetch(`/api/guild-data/${guildID}`);
                const data = await res.json();
                if (data.welcomeChannelId) {
                    document.getElementById('welcomeChannel').value = data.welcomeChannelId;
                    document.getElementById('welcomeMessage').value = data.welcomeMessage || '';
                }
            } catch (e) { console.error('خطأ في تحميل الإعدادات:', e); }
        }

        async function sendTicketPanel() {
            const btn = event.target;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري...';
            btn.disabled = true;

            try {
                const res = await fetch(`/api/send-ticket-panel/${guildID}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        channelId: document.getElementById('ticketChannel').value,
                        title: document.getElementById('ticketTitle').value,
                        type: document.getElementById('ticketType').value,
                        limit: document.getElementById('ticketLimit').value,
                        color: document.getElementById('embedColor').value,
                        mcRole: document.getElementById('mcRole').value,
                        discordRole: document.getElementById('discordRole').value
                    })
                });
                const result = await res.json();
                showNotification(result.success ? '✅ تم الإرسال!' : '❌ ' + (result.error || 'فشل'), result.success ? 'success' : 'error');
            } catch (error) {
                showNotification('❌ خطأ في الاتصال', 'error');
            } finally {
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال اللوحة';
                btn.disabled = false;
            }
        }

        async function saveWelcome() {
            try {
                const res = await fetch(`/api/save-settings/${guildID}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        welcomeMsg: document.getElementById('welcomeMessage').value,
                        welcomeChannelId: document.getElementById('welcomeChannel').value
                    })
                });
                showNotification('✅ تم حفظ إعدادات الترحيب!', 'success');
            } catch (e) {
                showNotification('❌ خطأ في الحفظ', 'error');
            }
        }

        function showNotification(text, type) {
            const div = document.createElement('div');
            div.className = `notification ${type}`;
            div.textContent = text;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        // تبديل الأقسام
        document.querySelectorAll('.menu-item[data-section]').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                item.classList.add('active');
                document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
                document.getElementById(item.dataset.section + '-section').style.display = 'block';
                document.getElementById('pageTitle').textContent = item.dataset.section === 'tickets' ? 'نظام التذاكر' : 'رسائل الترحيب';
            });
        });

        window.addEventListener('load', init);
    </script>
</body>
</html>
