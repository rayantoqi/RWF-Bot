<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWF Bot - الموقع الرسمي</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .container {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 600px;
            margin: auto;
        }
        .btn {
            background-color: #5865F2;
            color: white;
            padding: 10px 25px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #4752c4; }
        .status { color: #3ba55c; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RWF Bot 🚀</h1>
        <p>البوت العربي الأقوى لإدارة السيرفرات ونظام التكت.</p>
        <hr>
        <p>حالة البوت: <span class="status">متصل (Online) ✅</span></p>
        <a href="رابط_دعوة_بوتك" class="btn">إضافة البوت للسيرفر</a>
    </div>
</body>
</html>
