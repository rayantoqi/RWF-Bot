<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWF Bot | لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #5865F2; --bg-dark: #0a0a0a; --card-bg: #161b22; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Cairo', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 90%; max-width: 1000px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 40px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid #30363d; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: var(--main-color); }
        .card i { font-size: 2rem; color: var(--main-color); margin-bottom: 15px; }
        .stat-num { font-size: 1.5rem; font-weight: bold; display: block; }
        .btn-invite { background: var(--main-color); color: white; padding: 15px 40px; text-decoration: none; border-radius: 30px; font-weight: bold; display: inline-block; margin-top: 30px; box-shadow: 0 5px 15px rgba(88, 101, 242, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        <img src="رابط_صورة_بوتك" alt="Bot Logo" style="width: 120px; border-radius: 50%; border: 4px solid var(--main-color);">
        <h1>مرحباً بك في <span style="color: var(--main-color);">RWF Bot</span></h1>
        <p>البوت العربي المتكامل لإدارة سيرفرك وحماية مجتمعك.</p>
        
        <div class="grid">
            <div class="card">
                <i class="fas fa-server"></i>
                <span class="stat-num" id="server-count">...</span>
                <span>سيرفر</span>
            </div>
            <div class="card">
                <i class="fas fa-users"></i>
                <span class="stat-num" id="user-count">...</span>
                <span>مستخدم</span>
            </div>
            <div class="card">
                <i class="fas fa-bolt"></i>
                <span class="stat-num" id="ping">...</span>
                <span>سرعة الاستجابة</span>
            </div>
        </div>

        <a href="رابط_دعوة_بوتك" class="btn-invite">إضافة البوت للسيرفر</a>
    </div>

    <script>
        // كود سحب البيانات من البوت تلقائياً
        async function updateStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                document.getElementById('server-count').innerText = data.servers;
                document.getElementById('user-count').innerText = data.users;
                document.getElementById('ping').innerText = data.ping + 'ms';
            } catch (error) {
                console.log('Error fetching stats');
            }
        }
        setInterval(updateStats, 5000); // تحديث كل 5 ثواني
        updateStats();
    </script>
</body>
</html>
